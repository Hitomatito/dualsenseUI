name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential devscripts debhelper dh-python \
            python3-all python3-setuptools dpkg-dev
      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b
          ls -la ../*.deb
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ../dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          dnf install -y git rpm-build python3-setuptools python3-devel
      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf /tmp/dualsense-ui-${VERSION}.tar.gz \
            --transform "s,^,dualsense-ui-${VERSION}/," \
            --exclude=.git --exclude=.github --exclude=.pytest_cache --exclude=__pycache__ \
            -C $(pwd) .
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/dualsense-ui-${VERSION}.tar.gz rpmbuild/SOURCES/
          rpmbuild -ba dualsense-ui.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "version ${VERSION}"
          find rpmbuild -name '*.rpm'
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: rpmbuild/RPMS/**/*.rpm

  flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --install-deps-from=flathub build-dir flatpak/com.dualsenseui.yml
          flatpak build-bundle build-dir dualsense-ui.flatpak com.dualsenseui.app
          ls -la dualsense-ui.flatpak
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - run: ls -la deb-packages/ rpm-packages/ flatpak/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
