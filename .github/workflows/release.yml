name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: |
          set -ex
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          PKG=dualsense-ui_${VERSION}-1_all
          DEST=/tmp/$PKG
          mkdir -p $DEST/DEBIAN
          python3 -m pip install --root=$DEST --prefix=/usr .
          install -Dm644 data/com.dualsenseui.app.desktop $DEST/usr/share/applications/com.dualsenseui.app.desktop
          install -Dm644 data/icons/com.dualsenseui.svg $DEST/usr/share/icons/hicolor/scalable/apps/com.dualsenseui.svg
          install -Dm644 data/icons/usb-symbolic.svg $DEST/usr/share/icons/hicolor/symbolic/devices/usb-symbolic.svg
          cat > $DEST/DEBIAN/control <<-EOF
          Package: dualsense-ui
          Version: ${VERSION}-1
          Architecture: all
          Maintainer: DualSense UI Contributors
          Depends: python3, python3-gi, gir1.2-gtk-4.0, python3-gi-cairo, dualsensectl, python3-hidapi, python3-evdev
          Section: utils
          Priority: optional
          Description: Graphical interface for PlayStation DualSense controllers
          EOF
          dpkg-deb --build --root-owner-group $DEST
          mv /tmp/${PKG}.deb .
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .rpm
        run: |
          set -ex
          exec 2>&1
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential ruby ruby-dev rpm python3-setuptools
          gem install fpm --no-document
          python3 -m pip install --root=/tmp/staging --prefix=/usr .
          install -Dm644 data/com.dualsenseui.app.desktop /tmp/staging/usr/share/applications/com.dualsenseui.app.desktop
          install -Dm644 data/icons/com.dualsenseui.svg /tmp/staging/usr/share/icons/hicolor/scalable/apps/com.dualsenseui.svg
          install -Dm644 data/icons/usb-symbolic.svg /tmp/staging/usr/share/icons/hicolor/symbolic/devices/usb-symbolic.svg
          fpm -s dir -t rpm \
            --name dualsense-ui \
            --version $VERSION \
            --iteration 1 \
            --architecture all \
            --maintainer "DualSense UI Contributors" \
            --url "https://github.com/Hitomatito/dualsenseUI" \
            --license "GPL-3.0-or-later" \
            --description "Graphical interface for PlayStation DualSense controllers" \
            --depends python3-gobject \
            --depends gtk4 \
            --depends python3-gobject-cairo \
            --depends dualsensectl \
            --depends python3-hidapi \
            --depends python3-evdev \
            --rpm-postinst "/usr/bin/gtk-update-icon-cache /usr/share/icons/hicolor &>/dev/null || :" \
            --rpm-postun "/usr/bin/gtk-update-icon-cache /usr/share/icons/hicolor &>/dev/null || :" \
            -C /tmp/staging \
            usr
          ls -la *.rpm
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rpm-logs
          path: /tmp/rpm.log
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: ./*.rpm

  flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dualsense-ui.flatpak
          manifest-path: flatpak/com.dualsenseui.yml
          cache-key: flatpak-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
