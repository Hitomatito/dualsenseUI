name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: |
          set -ex
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          PKG=dualsense-ui_${VERSION}-1_all
          DEST=/tmp/$PKG
          mkdir -p $DEST/DEBIAN
          python3 -m pip install --root=$DEST --prefix=/usr .
          install -Dm644 data/com.dualsenseui.app.desktop $DEST/usr/share/applications/com.dualsenseui.app.desktop
          install -Dm644 data/icons/com.dualsenseui.svg $DEST/usr/share/icons/hicolor/scalable/apps/com.dualsenseui.svg
          install -Dm644 data/icons/usb-symbolic.svg $DEST/usr/share/icons/hicolor/symbolic/devices/usb-symbolic.svg
          cat > $DEST/DEBIAN/control <<-EOF
          Package: dualsense-ui
          Version: ${VERSION}-1
          Architecture: all
          Maintainer: DualSense UI Contributors
          Depends: python3, python3-gi, gir1.2-gtk-4.0, python3-gi-cairo, dualsensectl, python3-hidapi, python3-evdev
          Section: utils
          Priority: optional
          Description: Graphical interface for PlayStation DualSense controllers
          EOF
          dpkg-deb --build --root-owner-group $DEST
          mv /tmp/${PKG}.deb .
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-24.04
    container:
      image: fedora:41
    defaults:
      run:
        shell: bash
    steps:
      - name: Install git and checkout
        run: |
          dnf install -y -q git python3-setuptools
          git clone https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git .
          git checkout ${{ github.sha }}
      - name: Build .rpm
        run: |
          set -ex
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          dnf install -y -q rpm-build python3-setuptools
          tar czf /tmp/dualsense-ui-${VERSION}.tar.gz \
            --transform "s,^,dualsense-ui-${VERSION}/," \
            --exclude=.git --exclude=.github --exclude=.pytest_cache --exclude=__pycache__ \
            -C $(pwd) .
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/dualsense-ui-${VERSION}.tar.gz rpmbuild/SOURCES/
          rpmbuild -ba dualsense-ui.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "version ${VERSION}"
          find rpmbuild -name '*.rpm'
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: rpmbuild/RPMS/**/*.rpm

  flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dualsense-ui.flatpak
          manifest-path: flatpak/com.dualsenseui.yml
          cache-key: flatpak-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
