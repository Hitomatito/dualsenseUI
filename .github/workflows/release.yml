name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential devscripts debhelper dh-python python3-all python3-setuptools
      - name: Build .deb
        run: |
          dpkg-buildpackage -us -uc -b 2>&1 | tee /tmp/deb.log
          ls -la ../*.deb >> /tmp/deb.log
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deb-logs
          path: /tmp/deb.log
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ../dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rpm python3-setuptools python3-evdev
      - name: Build .rpm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          tar czf /tmp/dualsense-ui-${VERSION}.tar.gz \
            --transform "s,^,dualsense-ui-${VERSION}/," \
            --exclude=.git --exclude=.github --exclude=.pytest_cache --exclude=__pycache__ \
            -C $(pwd) .
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/dualsense-ui-${VERSION}.tar.gz rpmbuild/SOURCES/
          rpmbuild -ba dualsense-ui.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "version ${VERSION}" 2>&1 | tee /tmp/rpm.log
          find rpmbuild -name '*.rpm' >> /tmp/rpm.log
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rpm-logs
          path: /tmp/rpm.log
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: rpmbuild/RPMS/**/*.rpm

  flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
      - name: Build Flatpak
        run: |
          flatpak-builder --user --force-clean --install-deps-from=flathub build-dir flatpak/com.dualsenseui.yml 2>&1 | tee /tmp/flatpak.log
          flatpak build-bundle build-dir dualsense-ui.flatpak com.dualsenseui.app >> /tmp/flatpak.log 2>&1
          ls -la dualsense-ui.flatpak >> /tmp/flatpak.log
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-logs
          path: /tmp/flatpak.log
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
