name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: |
          sudo apt-get update
          sudo apt-get install -y debhelper dh-python python3-all python3-setuptools
          dpkg-buildpackage -us -uc -b
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: ../dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build .rpm
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm-build python3-setuptools
          VERSION=${GITHUB_REF_NAME#v}
          # Create source tarball
          tar czf /tmp/dualsense-ui-${VERSION}.tar.gz \
            --transform "s,^,dualsense-ui-${VERSION}/," \
            --exclude=.git \
            --exclude=.github \
            --exclude=.pytest_cache \
            --exclude=__pycache__ \
            -C $(pwd) .
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/dualsense-ui-${VERSION}.tar.gz rpmbuild/SOURCES/
          rpmbuild -ba dualsense-ui.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "version ${VERSION}"
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: rpmbuild/RPMS/**/*.rpm

  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dualsense-ui.flatpak
          manifest-path: flatpak/com.dualsenseui.yml
          cache-key: flatpak-${{ github.sha }}
      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: List artifacts
        run: ls -la deb-packages/ rpm-packages/ flatpak/
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
