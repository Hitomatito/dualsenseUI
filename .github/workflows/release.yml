name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: dualsense-ui.flatpak
          manifest-path: flatpak/com.dualsenseui.yml
          cache-key: flatpak-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dualsense-ui-flatpak
          path: dualsense-ui.flatpak

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dualsense-ui.flatpak
          generate_release_notes: true
