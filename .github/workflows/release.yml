name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build .deb
        run: |
          set -ex
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          PKG=dualsense-ui_${VERSION}-1_all
          DEST=/tmp/$PKG
          mkdir -p $DEST/DEBIAN
          python3 -m pip install --root=$DEST --prefix=/usr .
          install -Dm644 data/com.dualsenseui.app.desktop $DEST/usr/share/applications/com.dualsenseui.app.desktop
          install -Dm644 data/icons/com.dualsenseui.svg $DEST/usr/share/icons/hicolor/scalable/apps/com.dualsenseui.svg
          install -Dm644 data/icons/usb-symbolic.svg $DEST/usr/share/icons/hicolor/symbolic/devices/usb-symbolic.svg
          cat > $DEST/DEBIAN/control <<-EOF
          Package: dualsense-ui
          Version: ${VERSION}-1
          Architecture: all
          Maintainer: DualSense UI Contributors
          Depends: python3, python3-gi, gir1.2-gtk-4.0, python3-gi-cairo, dualsensectl, python3-hidapi, python3-evdev
          Section: utils
          Priority: optional
          Description: Graphical interface for PlayStation DualSense controllers
          EOF
          dpkg-deb --build --root-owner-group $DEST
          mv /tmp/${PKG}.deb .
      - uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dualsense-ui_*.deb

  rpm:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm python3-setuptools
      - name: Create tarball
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          tar czf /tmp/dualsense-ui-${VERSION}.tar.gz \
            --transform "s,^,dualsense-ui-${VERSION}/," \
            --exclude=.git --exclude=.github --exclude=.pytest_cache --exclude=__pycache__ \
            -C $(pwd) .
      - name: Build .rpm
        run: |
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}
          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp /tmp/dualsense-ui-${VERSION}.tar.gz rpmbuild/SOURCES/
          rpmbuild -ba dualsense-ui.spec \
            --define "_topdir $(pwd)/rpmbuild" \
            --define "version ${VERSION}"
          find rpmbuild -name '*.rpm'
      - uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: rpmbuild/RPMS/**/*.rpm

  flatpak:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install flatpak-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq flatpak flatpak-builder
      - name: Build Flatpak
        run: |
          set -ex
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak-builder --user --force-clean --install-deps-from=flathub build-dir flatpak/com.dualsenseui.yml > /tmp/flatpak.log 2>&1 || rc=$?
          cat /tmp/flatpak.log
          if [ -n "$rc" ] && [ "$rc" -ne 0 ]; then exit $rc; fi
          flatpak build-bundle build-dir dualsense-ui.flatpak com.dualsenseui.app
          ls -la dualsense-ui.flatpak
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-logs
          path: /tmp/flatpak.log
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dualsense-ui.flatpak

  release:
    needs: [deb, rpm, flatpak]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            deb-packages/*.deb
            rpm-packages/*.rpm
            flatpak/dualsense-ui.flatpak
          generate_release_notes: true
