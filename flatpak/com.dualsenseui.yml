app-id: com.dualsenseui.app
runtime: org.gnome.Platform
runtime-version: '47'
sdk: org.gnome.Sdk
command: dualsense-ui

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=all
  - --filesystem=host-os

modules:
  - name: libhidapi
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/libusb/hidapi/archive/hidapi-0.14.0.tar.gz
        sha256: a57141241ee8e9537af3dd32d978b27086866d101344bfae7e2955b9cc6f7108

  - name: dualsensectl
    buildsystem: simple
    build-commands:
      - meson setup build
      - ninja -C build
      - ninja -C build install
    sources:
      - type: archive
        url: https://github.com/nowrep/dualsensectl/archive/v0.7.tar.gz
        sha256: a615304596925738b12d0a499f31e1fe0cc3653da230edfe7c68637098ce6b72

  - name: dualsense-ui
    build-options:
      no-network: false
    buildsystem: simple
    build-commands:
      - python3 -m pip install --prefix=/app --no-build-isolation evdev hidapi
      - python3 -m pip install --prefix=/app --no-build-isolation --no-deps .
      - install -Dm644 data/com.dualsenseui.app.desktop /app/share/applications/com.dualsenseui.app.desktop
      - install -Dm644 data/icons/com.dualsenseui.svg /app/share/icons/hicolor/scalable/apps/com.dualsenseui.svg
      - install -Dm644 data/icons/usb-symbolic.svg /app/share/icons/hicolor/symbolic/devices/usb-symbolic.svg
    sources:
      - type: dir
        path: ..
